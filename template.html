<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI活用事例ライブラリ | BottoK</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F3EE;--surface:#FFFFFF;--surface2:#EDEBE5;
    --ink:#1A1916;--ink2:#6B6860;--ink3:#A8A69F;
    --accent:#2D5BE3;--accent-light:#EEF2FD;--accent-dark:#1A3FA8;
    --red:#D64040;--red-light:#FDF0F0;
    --border:rgba(26,25,22,0.1);--border2:rgba(26,25,22,0.06);
    --radius:12px;--radius-sm:8px;
    --shadow-hover:0 4px 12px rgba(0,0,0,0.12),0 12px 32px rgba(0,0,0,0.08);
    --font-display:'Syne',sans-serif;--font-body:'Noto Sans JP',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
  .site-header{background:var(--ink);color:#fff;padding:0 2rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:56px;border-bottom:1px solid rgba(255,255,255,0.08)}
  .site-logo{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:.04em;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
  .site-logo span{font-size:11px;font-weight:400;opacity:.5;letter-spacing:.08em;text-transform:uppercase}
  .header-right{display:flex;align-items:center;gap:12px}
  .header-count{font-size:12px;opacity:.5}
  .header-updated{font-size:11px;opacity:.35}
  .hero{background:var(--ink);color:#fff;padding:4rem 2rem 3.5rem;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 80% 50%,rgba(45,91,227,.18) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 20% 80%,rgba(201,150,58,.12) 0%,transparent 60%)}
  .hero-inner{position:relative;max-width:1100px;margin:0 auto}
  .hero-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.5;margin-bottom:1rem}
  .hero-title{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1.1;margin-bottom:1rem;letter-spacing:-.02em}
  .hero-title em{font-style:normal;color:#6B8FF5}
  .hero-sub{font-size:15px;opacity:.6;max-width:480px;line-height:1.7;font-weight:300}
  .controls-wrap{background:var(--surface);border-bottom:1px solid var(--border2);position:sticky;top:56px;z-index:90}
  .controls{max-width:1100px;margin:0 auto;padding:1rem 2rem;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
  .search-input{width:100%;height:38px;padding:0 12px 0 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--ink3)}
  .filter-pills{display:flex;gap:6px;flex-wrap:wrap}
  .pill{height:32px;padding:0 14px;border-radius:999px;border:1.5px solid var(--border);background:transparent;font-family:var(--font-body);font-size:12px;color:var(--ink2);cursor:pointer;transition:all .12s;white-space:nowrap}
  .pill:hover{border-color:var(--accent);color:var(--accent)}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
  .main{max-width:1100px;margin:0 auto;padding:2rem 2rem 4rem}
  .grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
  .result-count{font-size:13px;color:var(--ink3)}
  .sort-select{height:32px;padding:0 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;background:var(--surface);color:var(--ink2);cursor:pointer;outline:none}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  .case-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border2);overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer;display:flex;flex-direction:column;animation:fadeUp .35s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .case-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:var(--border)}
  .card-thumb{width:100%;aspect-ratio:16/9;background:var(--surface2);position:relative;overflow:hidden}
  .card-thumb img{width:100%;height:100%;object-fit:cover}
  .thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .thumb-icon{width:40px;height:40px;opacity:.22;color:var(--ink2)}
  .card-cat-badge{position:absolute;bottom:10px;left:10px;height:22px;padding:0 10px;border-radius:999px;font-size:10px;font-weight:500;display:flex;align-items:center}
  .card-body{padding:1rem 1.125rem;flex:1;display:flex;flex-direction:column;gap:10px}
  .card-title{font-family:var(--font-display);font-size:15px;font-weight:600;line-height:1.4;color:var(--ink);letter-spacing:-.01em}
  .card-desc{font-size:12.5px;color:var(--ink2);line-height:1.65;font-weight:300;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-tags{display:flex;gap:5px;flex-wrap:wrap}
  .tag{height:20px;padding:0 8px;border-radius:4px;font-size:10px;background:var(--accent-light);color:var(--accent-dark);font-weight:500;display:flex;align-items:center}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border2);margin-top:auto}
  .card-date{font-size:11px;color:var(--ink3)}
  .card-actions{display:flex;gap:8px;align-items:center}
  .like-btn{display:flex;align-items:center;gap:5px;padding:0 10px;height:28px;border-radius:999px;border:1.5px solid var(--border);background:transparent;font-family:var(--font-body);font-size:12px;color:var(--ink2);cursor:pointer;transition:all .15s}
  .like-btn:hover{border-color:var(--red);color:var(--red)}
  .like-btn.liked{background:var(--red-light);border-color:var(--red);color:var(--red)}
  .slide-link{display:flex;align-items:center;gap:5px;padding:0 10px;height:28px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:11px;font-weight:500;text-decoration:none;transition:background .15s;font-family:var(--font-body)}
  .slide-link:hover{background:var(--accent-dark)}
  .cat-業務効率化{background:rgba(45,91,227,.12);color:#1A3FA8}
  .cat-営業支援{background:rgba(31,138,94,.12);color:#155F3F}
  .cat-資料作成{background:rgba(126,84,184,.12);color:#5B3A8A}
  .cat-コード生成{background:rgba(215,113,30,.12);color:#9B5215}
  .cat-データ分析{background:rgba(201,150,58,.12);color:#8A5E0F}
  .cat-その他{background:rgba(108,101,90,.12);color:#4A4640}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:2rem;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25)}
  .modal-header{position:relative;padding:1.5rem 1.5rem 0}
  .modal-close{position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:16px;transition:background .12s}
  .modal-close:hover{background:var(--surface2)}
  .modal-body{padding:1.25rem 1.5rem 1.5rem}
  .modal-title{font-family:var(--font-display);font-size:20px;font-weight:700;line-height:1.3;letter-spacing:-.01em;margin-bottom:12px;padding-right:2rem}
  .modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
  .modal-desc{font-size:14px;color:var(--ink2);line-height:1.75;font-weight:300;margin-bottom:1.25rem}
  .modal-slide-btn{display:inline-flex;align-items:center;gap:8px;padding:0 20px;height:42px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;text-decoration:none;font-size:14px;font-weight:500;transition:background .15s;font-family:var(--font-body)}
  .modal-slide-btn:hover{background:var(--accent-dark)}
  .modal-slide-nourl{font-size:13px;color:var(--ink3);padding:12px;background:var(--bg);border-radius:var(--radius-sm)}
  .modal-notion-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);text-decoration:none;margin-top:14px}
  .modal-notion-link:hover{color:var(--accent)}
  .state-empty{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--ink3)}
  .state-empty-icon{font-size:48px;margin-bottom:12px;opacity:.3}
  .site-footer{border-top:1px solid var(--border2);padding:1.5rem 2rem;text-align:center;font-size:12px;color:var(--ink3)}
  .site-footer a{color:inherit}
  .site-footer a:hover{color:var(--accent)}
  @media(max-width:600px){
    .hero{padding:2.5rem 1.25rem 2rem}
    .controls,.main{padding-left:1.25rem;padding-right:1.25rem}
    .cards-grid{grid-template-columns:1fr}
    .site-header{padding:0 1.25rem}
  }
</style>
</head>
<body>
<header class="site-header">
  <a href="#" class="site-logo">BottoK <span>AI事例ライブラリ</span></a>
  <div class="header-right">
    <span class="header-updated">更新: __UPDATED_JST__</span>
    <span class="header-count" id="headerCount"></span>
  </div>
</header>
<section class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">Generative AI Use Cases</p>
    <h1 class="hero-title">社内の<em>生成AI</em>活用事例<br>を一覧で</h1>
    <p class="hero-sub">営業現場で即使える事例を集約。商談のその場でアクセスして、提案の説得力を高めよう。</p>
  </div>
</section>
<div class="controls-wrap">
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="タイトル・概要で検索…">
    </div>
    <div class="filter-pills" id="filterPills"></div>
  </div>
</div>
<main class="main">
  <div class="grid-header">
    <span class="result-count" id="resultCount"></span>
    <select class="sort-select" id="sortSelect">
      <option value="newest">新しい順</option>
      <option value="likes">いいね順</option>
    </select>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</main>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" id="modalCloseBtn">&#x2715;</button>
      <p class="modal-title" id="mTitle"></p>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="mMeta"></div>
      <p class="modal-desc" id="mDesc"></p>
      <div id="mSlide"></div>
      <a id="mNotionLink" href="#" target="_blank" rel="noopener" class="modal-notion-link">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Notionで開く
      </a>
    </div>
  </div>
</div>
<footer class="site-footer">
  &#169; 2026 BottoK Inc. &nbsp;&middot;&nbsp; データソース: Notion AI活用事例DB
  &nbsp;&middot;&nbsp; <a href="https://www.notion.so/3e4668ffa71e4d6d9bcc3f356588dbc3" target="_blank" rel="noopener">DBを開く</a>
</footer>
<script>
var CASES = __CASES_JSON__;
var activeCategory = 'all', searchQuery = '', sortOrder = 'newest';
var liked = new Set(JSON.parse(localStorage.getItem('bottok_liked') || '[]'));

function fmt(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function filtered() {
  var list = CASES.slice();
  if (activeCategory !== 'all') list = list.filter(function(c){ return c.category === activeCategory; });
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    list = list.filter(function(c){
      return c.title.toLowerCase().indexOf(q) >= 0 ||
             c.desc.toLowerCase().indexOf(q) >= 0 ||
             c.tags.some(function(t){ return t.toLowerCase().indexOf(q) >= 0; });
    });
  }
  if (sortOrder === 'likes') list.sort(function(a,b){ return b.likes - a.likes; });
  else list.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
  return list;
}
function buildPills() {
  var cats = ['all'];
  CASES.forEach(function(c){ if (cats.indexOf(c.category) < 0) cats.push(c.category); });
  document.getElementById('filterPills').innerHTML = cats.map(function(cat) {
    var active = cat === activeCategory ? ' active' : '';
    var label = cat === 'all' ? 'すべて' : esc(cat);
    return '<button class="pill' + active + '" onclick="setCategory(\'' + esc(cat) + '\')">' + label + '</button>';
  }).join('');
}
function setCategory(cat) { activeCategory = cat; buildPills(); render(); }
function render() {
  var list = filtered();
  document.getElementById('resultCount').textContent = list.length + '件の事例';
  document.getElementById('headerCount').textContent = CASES.length + '事例';
  if (!list.length) {
    document.getElementById('cardsGrid').innerHTML = '<div class="state-empty"><div class="state-empty-icon">&#x1F50D;</div><p>条件に合う事例が見つかりません</p></div>';
    return;
  }
  document.getElementById('cardsGrid').innerHTML = list.map(function(c, i) { return buildCard(c, i); }).join('');
}
function buildCard(c, i) {
  var lk = liked.has(c.id);
  var thumb = c.thumbUrl
    ? '<img src="' + esc(c.thumbUrl) + '" alt="' + esc(c.title) + '" loading="lazy">'
    : '<div class="thumb-placeholder"><svg class="thumb-icon" viewBox="0 0 48 48" fill="none"><rect x="6" y="8" width="36" height="32" rx="3" fill="currentColor"/><rect x="12" y="16" width="16" height="2" rx="1" fill="white" opacity="0.6"/><rect x="12" y="22" width="24" height="2" rx="1" fill="white" opacity="0.4"/><rect x="12" y="28" width="20" height="2" rx="1" fill="white" opacity="0.4"/></svg></div>';
  var tags = c.tags.length
    ? '<div class="card-tags">' + c.tags.map(function(t){ return '<span class="tag">' + esc(t) + '</span>'; }).join('') + '</div>'
    : '';
  var slideBtn = c.slideUrl
    ? '<a class="slide-link" href="' + esc(c.slideUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>スライド</a>'
    : '';
  var heartFill = lk ? 'currentColor' : 'none';
  var likedClass = lk ? ' liked' : '';
  return '<article class="case-card" style="animation-delay:' + (i*45) + 'ms" onclick="openModal(\'' + c.id + '\')">'
    + '<div class="card-thumb">' + thumb + '<span class="card-cat-badge cat-' + esc(c.category) + '">' + esc(c.category) + '</span></div>'
    + '<div class="card-body">'
    + '<h3 class="card-title">' + esc(c.title) + '</h3>'
    + '<p class="card-desc">' + esc(c.desc) + '</p>'
    + tags
    + '<div class="card-footer">'
    + '<span class="card-date">' + fmt(c.createdAt) + '</span>'
    + '<div class="card-actions" onclick="event.stopPropagation()">'
    + '<button class="like-btn' + likedClass + '" onclick="toggleLike(event,\'' + c.id + '\')" id="like-' + c.id + '">'
    + '<svg width="12" height="12" viewBox="0 0 24 24" fill="' + heartFill + '" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
    + '<span id="lc-' + c.id + '">' + (c.likes + (lk ? 1 : 0)) + '</span>'
    + '</button>'
    + slideBtn
    + '</div></div></div></article>';
}
function toggleLike(e, id) {
  e.stopPropagation();
  var c = CASES.find(function(x){ return x.id === id; });
  if (!c) return;
  var btn = document.getElementById('like-' + id);
  var cnt = document.getElementById('lc-' + id);
  if (liked.has(id)) {
    liked.delete(id); btn.classList.remove('liked');
    btn.querySelector('path').setAttribute('fill','none'); cnt.textContent = c.likes;
  } else {
    liked.add(id); btn.classList.add('liked');
    btn.querySelector('path').setAttribute('fill','currentColor'); cnt.textContent = c.likes + 1;
  }
  localStorage.setItem('bottok_liked', JSON.stringify(Array.from(liked)));
}
function openModal(id) {
  var c = CASES.find(function(x){ return x.id === id; });
  if (!c) return;
  document.getElementById('mTitle').textContent = c.title;
  var metaHtml = '<span class="card-cat-badge cat-' + esc(c.category) + '" style="position:static;height:22px;padding:0 10px;display:inline-flex;align-items:center;border-radius:999px;font-size:11px;">' + esc(c.category) + '</span>';
  c.tags.forEach(function(t){ metaHtml += '<span class="tag">' + esc(t) + '</span>'; });
  metaHtml += '<span style="font-size:11px;color:var(--ink3)">' + fmt(c.createdAt) + ' &middot; ' + esc(c.poster) + '</span>';
  document.getElementById('mMeta').innerHTML = metaHtml;
  document.getElementById('mDesc').textContent = c.desc || '概要未入力';
  document.getElementById('mSlide').innerHTML = c.slideUrl
    ? '<a class="modal-slide-btn" href="' + esc(c.slideUrl) + '" target="_blank" rel="noopener"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Googleスライドを開く</a>'
    : '<p class="modal-slide-nourl">スライドはまだ登録されていません。</p>';
  document.getElementById('mNotionLink').href = c.notionUrl;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalOverlay').addEventListener('click', function(e){ if (e.target === document.getElementById('modalOverlay')) closeModal(); });
document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });
document.getElementById('searchInput').addEventListener('input', function(e){ searchQuery = e.target.value.trim(); render(); });
document.getElementById('sortSelect').addEventListener('change', function(e){ sortOrder = e.target.value; render(); });
buildPills();
render();
</script>
</body>
</html>
