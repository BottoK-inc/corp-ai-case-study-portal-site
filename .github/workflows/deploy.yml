name: Build & Deploy AI Cases Site

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = JST 07:00
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Notionからデータ取得
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: node scripts/fetch_notion.js

      - name: HTMLをビルド（distディレクトリに出力）
        run: |
          mkdir -p dist
          node scripts/build.js
          mv index.html dist/index.html

      - name: GitHub Pages用にアップロード（distのみ）
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
